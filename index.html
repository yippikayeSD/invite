<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- WhatsApp / Social Media Preview Tags -->
    <title>You're Invited!</title>
    <meta name="description" content="Click to view the invitation and location.">
    
    <!-- WhatsApp strictly requires a REAL file URL, not base64 -->
    <meta property="og:title" content="You're Invited!">
    <meta property="og:description" content="Tap to open the location in Google Maps.">
    <meta property="og:image" content="invite.jpg"> 
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="800">
    <meta property="og:image:height" content="800">
    <meta property="og:type" content="website">

    <!-- Instant Redirect -->
    <meta http-equiv="refresh" content="0;url=https://maps.app.goo.gl/wNSLsVtd71o2HQq17">

    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f9f9f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Opening location in Maps...</p>
    <p>If not redirected, <a href="https://maps.app.goo.gl/wNSLsVtd71o2HQq17">click here</a>.</p>

    <script>
        window.location.replace("https://maps.app.goo.gl/wNSLsVtd71o2HQq17");
    </script>
</body>
</html>
